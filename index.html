<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuck Norris Jokes - Vue</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
     <div id="app" class="container">
        <h1>{{ title }}</h1>
        <p>{{ message }}</p>
        <hr>
        <div class="grid">
            <joke-card v-for="(joke, index) in chuck"
                :key="index"
                :value="joke.value">
            </joke-card>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
